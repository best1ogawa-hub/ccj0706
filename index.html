<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>顧客マップ（配車用）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;}
  #map{position:absolute;top:0;bottom:0;left:0;right:0;}
  .panel{position:absolute;top:10px;right:10px;z-index:1000;background:rgba(255,255,255,.96);
         padding:12px 14px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.3);font-size:13px;max-width:220px;}
  .panel h1{font-size:15px;margin:0 0 6px;}
  .panel .sub{color:#555;font-size:11px;margin-bottom:10px;line-height:1.5;}
  .panel h2{font-size:12px;margin:10px 0 5px;color:#333;}
  .staff{display:flex;align-items:center;justify-content:space-between;margin:4px 0;cursor:pointer;user-select:none;
         padding:3px 6px;border-radius:6px;}
  .staff:hover{background:#f0f0f0;}
  .staff.off{opacity:.4;}
  .staff .l{display:flex;align-items:center;}
  .dot{width:14px;height:14px;border-radius:50%;margin-right:7px;border:2px solid #fff;box-shadow:0 0 2px #666;}
  .cnt{color:#888;font-size:11px;}
  .btns{margin-top:8px;font-size:11px;}
  .btns a{color:#1e88e5;cursor:pointer;text-decoration:underline;margin-right:10px;}
  .note{color:#888;font-size:10px;margin-top:10px;line-height:1.4;}
  .pin-label{background:rgba(0,0,0,.72);color:#fff;font-size:11px;font-weight:bold;
             padding:1px 5px;border-radius:9px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .lp{font-size:14px;line-height:1.6;} .lp b{font-size:16px;}
  #gate{position:fixed;inset:0;z-index:2000;background:#20262e;color:#fff;display:flex;
        align-items:center;justify-content:center;flex-direction:column;}
  #gate .box{background:#2b333d;padding:28px 26px;border-radius:12px;width:260px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.4);}
  #gate h2{margin:0 0 4px;font-size:17px;} #gate p{margin:0 0 16px;font-size:12px;color:#9fb0c0;}
  #gate input{width:100%;box-sizing:border-box;padding:10px;border-radius:7px;border:1px solid #48545f;
              background:#1c2229;color:#fff;font-size:15px;text-align:center;letter-spacing:2px;}
  #gate button{margin-top:12px;width:100%;padding:10px;border:0;border-radius:7px;background:#2196f3;color:#fff;font-size:15px;cursor:pointer;}
  #gate .err{color:#ff8a80;font-size:12px;height:16px;margin-top:8px;}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <h2>顧客マップ</h2><p>パスワードを入力してください</p>
    <input id="pw" type="password" autocomplete="off" placeholder="password" autofocus>
    <button id="go">表示</button><div class="err" id="err"></div>
  </div>
</div>
<div id="map"></div>
<div class="panel" style="display:none" id="panel">
  <h1>顧客マップ（配車用）</h1>
  <div class="sub">現役32世帯・全35地点<br>色 = 担当 / 円の大きさ = 月回数</div>
  <h2>担当で表示切替</h2>
  <div id="staffList"></div>
  <div class="btns"><a id="allOn">全表示</a><a id="allOff">全非表示</a></div>
  <div class="note">※ ピンをクリックで 苗字・月回数・担当を表示</div>
</div>

<script>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(PAYLOAD.s),iterations:PAYLOAD.it,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(PAYLOAD.i)},key,b64(PAYLOAD.c));
  return JSON.parse(new TextDecoder().decode(pt));
}

const STAFF_COLOR={"太田":"#e53935","長井":"#1e88e5","西田":"#43a047","山田":"#8e24aa","未定":"#9e9e9e"};
function radius(c){ if(c==="-")return 7; const n=parseFloat(c); return n<=1?8:n<=2?10:n<=4?12:15; }

let map, groups={};
function render(rows){
  map=L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
  const bounds=[]; const counts={};
  rows.forEach(([s,c,note,staff,lat,lng])=>{
    const col=STAFF_COLOR[staff]||"#607d8b";
    counts[staff]=(counts[staff]||0)+1;
    if(!groups[staff]) groups[staff]=L.layerGroup().addTo(map);
    bounds.push([lat,lng]);
    L.circleMarker([lat,lng],{radius:radius(c),color:"#fff",weight:2,fillColor:col,fillOpacity:0.9})
      .bindTooltip(s+note,{permanent:true,direction:"right",className:"pin-label",offset:[radius(c)-2,0]})
      .bindPopup('<div class="lp"><b>'+s+'</b> 様'+(note?' '+note:'')+
                 '<br>月回数：'+(c==="-"?"不定":c+" 回/月")+'<br>担当：'+staff+'</div>')
      .addTo(groups[staff]);
  });
  map.fitBounds(bounds,{padding:[50,50]});

  // 担当リスト（表示切替）
  const order=["太田","長井","西田","山田","未定"].filter(s=>counts[s]);
  const list=document.getElementById('staffList');
  list.innerHTML=order.map(s=>
    `<div class="staff" data-s="${s}"><span class="l"><span class="dot" style="background:${STAFF_COLOR[s]||'#607d8b'}"></span>${s}</span><span class="cnt">${counts[s]}件</span></div>`).join('');
  list.querySelectorAll('.staff').forEach(el=>{
    el.onclick=()=>{ const s=el.dataset.s; const on=!el.classList.contains('off');
      if(on){ map.removeLayer(groups[s]); el.classList.add('off'); }
      else { groups[s].addTo(map); el.classList.remove('off'); } };
  });
  document.getElementById('allOn').onclick=()=>order.forEach(s=>{groups[s].addTo(map);
    list.querySelector(`[data-s="${s}"]`).classList.remove('off');});
  document.getElementById('allOff').onclick=()=>order.forEach(s=>{map.removeLayer(groups[s]);
    list.querySelector(`[data-s="${s}"]`).classList.add('off');});

  document.getElementById('panel').style.display='block';
  document.getElementById('gate').style.display='none';
  setTimeout(()=>map.invalidateSize(),100);
}

async function submit(){
  const pw=document.getElementById('pw').value; document.getElementById('err').textContent='';
  try{ render(await decrypt(pw)); }catch(e){ document.getElementById('err').textContent='パスワードが違います'; }
}
document.getElementById('go').onclick=submit;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
</script>
</body>
</html>
