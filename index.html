<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>顧客マップ（配車用）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;}
  #map{position:absolute;top:0;bottom:0;left:0;right:0;}
  .panel{position:absolute;top:10px;right:10px;z-index:1000;background:rgba(255,255,255,.95);
         padding:12px 14px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.3);font-size:13px;max-width:210px;}
  .panel h1{font-size:15px;margin:0 0 6px;}
  .panel .sub{color:#555;font-size:11px;margin-bottom:8px;line-height:1.5;}
  .legend div{display:flex;align-items:center;margin:3px 0;}
  .dot{width:14px;height:14px;border-radius:50%;margin-right:7px;border:2px solid #fff;box-shadow:0 0 2px #666;}
  .pin-label{background:rgba(0,0,0,.72);color:#fff;font-size:11px;font-weight:bold;
             padding:1px 5px;border-radius:9px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .lp{font-size:14px;line-height:1.6;}
  .lp b{font-size:16px;}
  #gate{position:fixed;inset:0;z-index:2000;background:#20262e;color:#fff;display:flex;
        align-items:center;justify-content:center;flex-direction:column;font-family:inherit;}
  #gate .box{background:#2b333d;padding:28px 26px;border-radius:12px;width:260px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.4);}
  #gate h2{margin:0 0 4px;font-size:17px;}
  #gate p{margin:0 0 16px;font-size:12px;color:#9fb0c0;}
  #gate input{width:100%;box-sizing:border-box;padding:10px;border-radius:7px;border:1px solid #48545f;
              background:#1c2229;color:#fff;font-size:15px;text-align:center;letter-spacing:2px;}
  #gate button{margin-top:12px;width:100%;padding:10px;border:0;border-radius:7px;background:#2196f3;color:#fff;font-size:15px;cursor:pointer;}
  #gate .err{color:#ff8a80;font-size:12px;height:16px;margin-top:8px;}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <h2>顧客マップ</h2>
    <p>パスワードを入力してください</p>
    <input id="pw" type="password" autocomplete="off" placeholder="password" autofocus>
    <button id="go">表示</button>
    <div class="err" id="err"></div>
  </div>
</div>
<div id="map"></div>
<div class="panel" style="display:none" id="panel">
  <h1>顧客マップ（配車用）</h1>
  <div class="sub">現役32世帯・全35地点<br>色 = 月回数 / 円の大きさ = 回数</div>
  <div class="legend" id="legend"></div>
</div>

<script>
// パスワードで暗号化された顧客データ（ソースには暗号文のみ）
const PAYLOAD = {"s":"gcVUoESTqdS5Drwfu/Ubyw==","i":"cpV6Ov9YGS0vX0Wt","c":"b/pkWH1o1LXgS4+iro6T0+VqrVDV32TihU4FvDjliyBQoUJNwjU1GFSupLkAJu64119bD30mgDLc96976XugmOmBDKH1vphqHs0LX2beOvUWeJgrUgoT1H1M4CQ9XJe+YK1OxegcKzlCZplodg0A1+P7FIL90n+WaopUiYz/iynZwyKGcm9JeShgc66ZUpMj6LvqPEnEhvz088gUL1NpKomaq3asWFub2KJWcWNhRn+TSHdMuiCxvTee2mNI5cer+ExC6q35+6h7j4lUGh8tntZPNaKJp3JyTeISc3gb/u0cQXKXAYIil3ottHawfXBarYXeh7ITEApc2a6SIA0qA9wX2vMji3eGhSHe8HdQd4loXKbrGDgYJGtZXxFifFO/Hkf3bT/AabyDiA41tDRPjd2TftluB8uljufFexjllBtO7z46kyRC47BhpArbhqJ0terqSmoxJziYHSqU6H8pLwB5JwvxPuu8Xzl9RCHRhbsz3nMyLO67hx4rrfX3Rn1/B/uAIqCX7NKeQ+bRzgjKSXlcMPFft9qT/WIZR6m0YtoLyDryTYTeY/ew8bgIcYlLXllka0a1w7a96d7d7JxTx2q7sEYvUny7MsYexOsFf6lQymO1kAKGb1A46VQzT+Cnoc7mOeFq14RG2jsV5ArxuzY7WP/n+BFCAvczDXNcCPy7G879IQIyQNIaaGl8kq9KUQJPJKB6Q8NVb0bFJW4qGHYvrEDTNz+n7Z9KhU8F8Urfd/jw1zGFR0TbXP92k9OZVKoLIDi/EawngNnuwttClV9FvZXUBBIvn0a4UWC12PUf9aIVhHabUL7Qw6uw+W4qwKOVvQ8MFmAKLAFRJImvtByeAZ+EM+onWhL97kFHBied30/iqZ2RQOmxVfdLBs82+LxG6nH05th420GDqMIcq9hZSVUIegc9/PGs9t6qV0lldjgORJ5DrV18sZGZORUU/+hGsoqBFC/3xyDliMpJWIvGoDVJOBOD0cI+lMnbGNw7cbzGte62mX+Kp6LP+I5tYc5irbZOIr2RQMdzM9KfsufGQQu1pOuXHGJ8N1fHQH+X9k/NI4uJzzNuORj4Zv2oMF8SzIDr8oXicEjRhVFiQOaIuz8dI7hy2aXVJvXtu3cNVinrnJOxUZ+l2ZMlgWbkVqqa1a9P/yrpUfjKmavEXI3kAY6N1grIcga1zsv38lYOQpMpgLjD6+r7jj3bRP+LIE64Ys19JiVbFM8+TL2/insImHewTqO0G4T3c/HnPLYbH8aHA4gkPPkx9TvnYvhjzGcYpUGqIONJzOrjClffau8OmwPODgxYk+f36VgfyPqHcl8kHtdOzvWqMPiUm+Dn7Fs8I+/C6fh8jh+E6HXQAOovYDW760KDjS1tH17hZD3ppdJtgBArQprupKCdy2Xt2ciNW8Pm7M1w+Mx1ENIGtUKO7hD1M3mW+0u1WFkRmt8S+RcM4FP0Eay5QT607u/y8zP6G5/+7L9jPEXibjFSCDAB7AO4lNTlY775xFa0JgqZpBziCEYiWOicv2bgrrTb23eS8nMpwDoM0myBRLHvn/wcQwUyHZc4mMRn+chOl3/arYsK62abwzp1QWuC8lzf7jke3vMJD5AKIWUbNhWGdSYybUA0D5Ig34cG+TMiEznyRkvqxdBBqiQ44fb5Q7pCRuhXVwyvYE7ku3kY2ap9NrFru394JEW3DHZ87xJB3v2tdwD4n6wnCNL0SByTyYR/uHKCEKfWkeCKyLyLiOZc8rtzWHHKoK0zyAKkbnly+3YR88/e+VthA/RM5OFQdcZ9bTsieQml6H97FZG1QZRi5CSVhyYFb0eOjPKaenqYPMIxv5F/oKurYxnw1CEG3+jpvmy5NSxRCaYrFSD/S9xmUIbtgybv0OLK6gKjdA==","it":250000};

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(PAYLOAD.s),iterations:PAYLOAD.it,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(PAYLOAD.i)},key,b64(PAYLOAD.c));
  return JSON.parse(new TextDecoder().decode(pt));
}

function bucket(c){
  if(c==="-") return {col:"#9e9e9e", r:7};
  const n=parseFloat(c);
  if(n<=1)  return {col:"#4caf50", r:8};
  if(n<=2)  return {col:"#2196f3", r:10};
  if(n<=4)  return {col:"#ff9800", r:12};
  return         {col:"#e53935", r:15};
}

function render(rows){
  const map=L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19, attribution:'&copy; OpenStreetMap'}).addTo(map);
  const bounds=[];
  rows.forEach(([s,c,note,lat,lng])=>{
    const b=bucket(c); bounds.push([lat,lng]);
    L.circleMarker([lat,lng],{radius:b.r,color:"#fff",weight:2,fillColor:b.col,fillOpacity:0.9}).addTo(map)
      .bindTooltip(s+note,{permanent:true,direction:"right",className:"pin-label",offset:[b.r-2,0]})
      .bindPopup('<div class="lp"><b>'+s+'</b> 様'+(note?' '+note:'')+
                 '<br>月回数：'+(c==="-"?"不定":c+" 回/月")+'</div>');
  });
  map.fitBounds(bounds,{padding:[50,50]});
  const bk=[["#4caf50","月1回以下"],["#2196f3","月2回"],["#ff9800","月3〜4回"],["#e53935","月5回以上"],["#9e9e9e","不定"]];
  document.getElementById('legend').innerHTML=bk.map(([c,l])=>'<div><span class="dot" style="background:'+c+'"></span>'+l+'</div>').join('');
  document.getElementById('panel').style.display='block';
  document.getElementById('gate').style.display='none';
  setTimeout(()=>map.invalidateSize(),100);
}

async function submit(){
  const pw=document.getElementById('pw').value;
  document.getElementById('err').textContent='';
  try{ const rows=await decrypt(pw); render(rows); }
  catch(e){ document.getElementById('err').textContent='パスワードが違います'; }
}
document.getElementById('go').onclick=submit;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
</script>
</body>
</html>
